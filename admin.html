<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | PinkJu Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --pink: #f472b6; --blue: #38bdf8; --purple: #c084fc; --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }
        body { background: var(--bg-gradient); color: #f8fafc; min-height: 100vh; padding-bottom: 5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        
        .login-box { max-width: 400px; margin: 12vh auto; padding: 2.5rem; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 1.1rem; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; border-radius: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 999px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; background: linear-gradient(45deg, var(--pink), var(--purple)); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(244, 114, 182, 0.4); }

        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .card { position: relative; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1rem; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .add-card { border: 2px dashed var(--pink); background: rgba(244, 114, 182, 0.04); min-height: 300px; justify-content: center; align-items: center; cursor: pointer; color: var(--pink); transition: 0.3s; }
        .add-card:hover { border-color: var(--blue); color: var(--blue); background: rgba(56, 189, 248, 0.04); }
        
        .item-img { width: 100%; height: 190px; object-fit: cover; border-radius: 15px; margin-bottom: 1.2rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        .card-actions { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 8px; }
        .icon-btn { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--glass-border); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.2s; }
        .icon-btn.del:hover { background: #ef4444; border-color: #ef4444; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--purple); border-radius: 25px; padding: 2.5rem; width: 100%; max-width: 480px; position: relative; max-height: 95vh; overflow-y: auto; box-shadow: 0 0 60px rgba(192, 132, 252, 0.3); }
        
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15,23,42,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div style="width:40px; height:40px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--pink); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:15px; color:var(--pink); font-size: 0.9rem;">ระบบกำลังประมวลผล</p>
    </div>

    <div class="container">
        <!-- 🛑 LOGIN SECTION 🛑 -->
        <div id="login-view" class="login-box">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <svg viewBox="0 0 24 24" width="50" height="50" stroke="var(--pink)" fill="none" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2 style="margin-top:20px; font-weight: 500;">Admin Login</h2>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:8px;">PINKJU STYLE CONTROL PANEL</p>
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="admin@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="pass" placeholder="••••••••"></div>
            <button class="btn" onclick="handleLogin()">เข้าสู่ระบบ</button>
        </div>

        <!-- 📋 DASHBOARD SECTION 📋 -->
        <div id="admin-view" style="display: none;">
            <header class="dashboard-header">
                <div>
                    <h1 style="font-size:1.8rem; font-weight: 600;">จัดการเทมเพลต</h1>
                    <p style="color:var(--text-muted); font-size:0.85rem; margin-top: 5px;">ระบบจัดการข้อมูลสมาชิกแบบเรียลไทม์</p>
                </div>
                <button onclick="supabase.auth.signOut()" style="background:none; border:1px solid var(--glass-border); color:var(--text-muted); padding:8px 22px; border-radius:99px; cursor:pointer; font-size: 0.8rem; transition: 0.3s;">LOGOUT</button>
            </header>
            <div class="grid" id="admin-grid"></div>
        </div>
    </div>

    <!-- ✏️ MODAL ✏️ -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:2rem; font-size: 1.3rem; font-weight: 500;">เพิ่มรายการใหม่</h2>
            
            <div class="form-group">
                <label>รูปพรีวิว</label>
                <div style="border:2px dashed var(--glass-border); border-radius:15px; padding:1.5rem; text-align:center; position:relative; background: rgba(0,0,0,0.2);">
                    <span style="font-size:0.8rem; color:var(--text-muted);">เลือกไฟล์ภาพ</span>
                    <input type="file" id="f-img" accept="image/*" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
                    <img id="p-img" style="width:100%; height:160px; object-fit:cover; border-radius:12px; margin-top:12px; display:none; border: 1px solid var(--glass-border);">
                </div>
            </div>

            <div class="form-group"><label>หมวดหมู่ (EP)</label><input type="text" id="f-ep" placeholder="เช่น EP.1 Basic"></div>
            <div class="form-group"><label>ชื่อเทมเพลต</label><input type="text" id="f-title"></div>
            <div class="form-group"><label>ลิงก์ GOOGLE DRIVE</label><input type="url" id="f-link" placeholder="https://..."></div>
            
            <input type="hidden" id="f-id"><input type="hidden" id="f-old-url">
            
            <div style="display:flex; gap:12px; margin-top:2.5rem;">
                <button class="btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);" onclick="closeModal()">ยกเลิก</button>
                <button class="btn" onclick="handleSave()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fwcwwmnrxecsxjgxephn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3Y3d3bW5yeGVjc3hqZ3hlcGhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjg4NjMsImV4cCI6MjA5MDk0NDg2M30.aduDIUVyy92BC6uRFBaUaPH2N9tmQlweEk6zWb07GCY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = () => {
            supabase.auth.onAuthStateChange((ev, session) => {
                const isAuth = !!session;
                document.getElementById('login-view').style.display = isAuth ? 'none' : 'block';
                document.getElementById('admin-view').style.display = isAuth ? 'block' : 'none';
                if(isAuth) { loadGrid(); syncRealtime(); }
            });
        };

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("กรุณาระบุข้อมูลให้ครบถ้วน");
            
            toggleLoading(true);
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            toggleLoading(false);
            if(error) alert("การเข้าสู่ระบบล้มเหลว: " + error.message);
        }

        async function loadGrid() {
            const grid = document.getElementById('admin-grid');
            const { data, error } = await supabase.from('templates').select('*').order('created_at', { ascending: false });
            if(error) return;

            grid.innerHTML = `
                <div class="card add-card" onclick="openModal()">
                    <svg viewBox="0 0 24 24" width="45" height="45" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <p style="margin-top:15px; font-weight:500; font-size: 0.9rem;">เพิ่มเทมเพลตใหม่</p>
                </div>
            `;

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-actions">
                        <button class="icon-btn" onclick='openModal(${JSON.stringify(item)})'><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                        <button class="icon-btn del" onclick="handleDelete('${item.id}')"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                    <img src="${item.image}" class="item-img" onerror="this.src='https://via.placeholder.com/200'">
                    <p style="font-size:0.75rem; color:var(--blue); font-weight:600; text-transform: uppercase;">${item.ep}</p>
                    <p style="font-size:0.95rem; margin-top: 5px;">${item.title}</p>
                `;
                grid.appendChild(div);
            });
        }

        document.getElementById('f-img').onchange = function() {
            const file = this.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => { const p = document.getElementById('p-img'); p.src = e.target.result; p.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };

        window.openModal = (item = null) => {
            document.getElementById('f-id').value = item ? item.id : '';
            document.getElementById('f-title').value = item ? item.title : '';
            document.getElementById('f-ep').value = item ? item.ep : '';
            document.getElementById('f-link').value = item ? item.link : '';
            document.getElementById('f-old-url').value = item ? item.image : '';
            document.getElementById('modal-title').innerText = item ? 'แก้ไขรายการ' : 'เพิ่มรายการใหม่';
            const p = document.getElementById('p-img');
            if(item) { p.src = item.image; p.style.display = 'block'; } else { p.style.display = 'none'; }
            document.getElementById('modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');

        async function handleSave() {
            const id = document.getElementById('f-id').value;
            const file = document.getElementById('f-img').files[0];
            const title = document.getElementById('f-title').value;
            const ep = document.getElementById('f-ep').value;
            const link = document.getElementById('f-link').value;
            
            if(!id && !file) return alert("กรุณาเลือกไฟล์ภาพ");
            if(!title || !ep || !link) return alert("กรุณากรอกข้อมูลให้ครบ");

            toggleLoading(true);
            try {
                let imgUrl = document.getElementById('f-old-url').value;
                if(file) {
                    const fileName = Date.now() + "_" + file.name.replace(/\s/g, '');
                    const { error: upErr } = await supabase.storage.from('images').upload(fileName, file);
                    if(upErr) throw upErr;
                    imgUrl = supabase.storage.from('images').getPublicUrl(fileName).data.publicUrl;
                }

                const payload = { title, ep, link, image: imgUrl };
                const { error } = id ? await supabase.from('templates').update(payload).eq('id', id) : await supabase.from('templates').insert([payload]);
                if(error) throw error;
                closeModal();
            } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); } finally { toggleLoading(false); }
        }

        window.handleDelete = async (id) => {
            if(!confirm("ยืนยันการลบรายการนี้?")) return;
            toggleLoading(true);
            await supabase.from('templates').delete().eq('id', id);
            toggleLoading(false);
        };

        function syncRealtime() { supabase.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'templates' }, () => loadGrid()).subscribe(); }
        function toggleLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
