<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PinkJu Style Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --border-color: rgba(255, 255, 255, 0.1);
            --pink-accent: #f472b6;
            --blue-accent: #38bdf8;
            --purple-accent: #c084fc;
            --danger-color: #ef4444;
            --new-accent: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; position: relative; }
        .container { max-width: 1100px; margin: 0 auto; padding: 15px; position: relative; z-index: 2; }
        
        /* 🌸 Cute Flower Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .flower-spinner { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #debug-msg { margin-top: 15px; font-size: 0.85rem; color: var(--pink-accent); text-align: center; font-weight: 500; }

        /* ✨ Cute Header */
        header { position: relative; text-align: center; padding: 35px 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 20px; margin-bottom: 25px; overflow: hidden; }
        .header-decor { position: absolute; opacity: 0.3; pointer-events: none; }
        .decor-1 { top: 10px; left: 10px; animation: float 3s ease-in-out infinite; }
        .decor-2 { bottom: 10px; right: 10px; animation: float 4s ease-in-out infinite reverse; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        h1 { font-size: 1.3rem; background: linear-gradient(90deg, var(--pink-accent), var(--blue-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.4; font-weight: 600; }
        .subtitle { color: var(--text-dim); font-size: 0.8rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* Search & Filter */
        .controls-area { margin-bottom: 25px; }
        .search-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .search-wrapper svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; z-index: 10; }
        .search-wrapper input { width: 100%; padding: 14px 15px 14px 52px !important; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 12px; color: #fff; font-size: 0.95rem; outline: none; transition: 0.3s; box-sizing: border-box; -webkit-appearance: none; }
        .search-wrapper input:focus { border-color: var(--pink-accent); }
        
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 6px 15px; background: var(--card-color); border: 1px solid var(--border-color); border-radius: 15px; color: var(--text-dim); cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.3s; }
        .filter-btn.active { background: linear-gradient(45deg, var(--pink-accent), var(--purple-accent)); color: #fff; border-color: transparent; }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; } }

        .card { background: var(--card-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; position: relative; }
        
        /* 1:1 Image Ratio */
        .card-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 10px; background: #000; margin-bottom: 12px; border: 1px solid var(--border-color); }
        
        /* ✨ NEW Badge Style (Top Right Pop-out) */
        .badge-new { position: absolute; top: -8px; right: -8px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; padding: 6px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); z-index: 10; display: flex; align-items: center; gap: 4px; animation: pulse-badge 2s infinite; pointer-events: none; }
        @keyframes pulse-badge { 0% { transform: scale(1); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); } 50% { transform: scale(1.05); box-shadow: 0 4px 20px rgba(239, 68, 68, 0.7); } 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); } }

        /* 🏷️ Detail Tags (Under Image) */
        .detail-tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .tag-ep { background: rgba(56, 189, 248, 0.1); color: var(--blue-accent); border: 1px solid rgba(56, 189, 248, 0.2); }
        .tag-logo { background: rgba(244, 114, 182, 0.1); color: var(--pink-accent); border: 1px solid rgba(244, 114, 182, 0.2); }

        .card-title { font-size: 0.95rem; margin-bottom: 15px; font-weight: 400; color: #f1f5f9; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Buttons */
        .btn-row { display: flex; gap: 6px; margin-top: auto; }
        .btn { flex: 1; padding: 8px 5px; border-radius: 8px; border: none; cursor: pointer; color: #fff; font-weight: 500; font-size: 0.8rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; text-align: center; }
        .btn-primary { background: linear-gradient(45deg, var(--pink-accent), var(--purple-accent)); }
        .btn-danger { background: linear-gradient(45deg, var(--danger-color), #b91c1c); }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: #fff; }
        .btn-full { width: 100%; padding: 12px; font-size: 0.95rem; border-radius: 12px; }

        /* Login Box */
        .login-card { max-width: 400px; margin: 40px auto; padding: 25px; background: var(--card-color); border-radius: 20px; border: 1px solid var(--border-color); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], input[type="url"], input[type="email"], input[type="password"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 10px; color: #fff; outline: none; font-size: 0.9rem; }
        
        select.custom-select { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 10px; color: #fff; outline: none; font-size: 0.9rem; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; cursor: pointer; }
        select.custom-select:focus { border-color: var(--blue-accent); }
        select.custom-select option { background: #1e293b; color: #fff; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; padding: 5px 0; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--pink-accent); cursor: pointer; }
        .checkbox-group span { font-size: 0.9rem; color: #fff; }

        /* Admin Dashboard */
        .admin-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .admin-nav h2 { font-size: 1.2rem; margin: 0; }
        .btn-logout { width: max-content; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.3); color: var(--text-dim); cursor: pointer; transition: 0.2s; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .btn-logout:hover { color: var(--pink-accent); border-color: var(--pink-accent); }

        .add-card { border: 2px dashed var(--pink-accent); background: rgba(244, 114, 182, 0.05); aspect-ratio: 1/1; justify-content: center; color: var(--pink-accent); cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s;}
        .add-card:hover { background: rgba(244, 114, 182, 0.1); }
        .action-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; opacity: 0; transition: 0.3s; z-index: 20; }
        .card:hover .action-layer { opacity: 1; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.9); color: #fff; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); cursor: pointer; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal.active { display: flex; animation: popup 0.2s ease-out; }
        .modal-content { background: var(--card-color); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; position: relative; border: 1px solid var(--border-color); max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-content.delete-style { max-width: 350px; text-align: center; border-color: var(--danger-color); padding: 30px 20px; }

        @keyframes popup { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .footer { text-align: center; margin-top: 40px; padding: 20px; opacity: 0.3; border-top: 1px solid var(--border-color); }
        .admin-link { color: var(--text-dim); text-decoration: none; font-size: 0.75rem; }
        .status-text { font-size: 0.8rem; text-align: center; margin-top: 10px; min-height: 1.2rem; color: #f87171; }
    </style>
</head>
<body>

<!-- 🌸 โหลดดิ้งดอกไม้หมุน -->
<div id="loader">
    <svg class="flower-spinner" viewBox="0 0 100 100" width="55" height="55">
        <path fill="var(--pink-accent)" d="M50 20 C40 0, 20 10, 30 30 C10 20, 0 40, 20 50 C0 60, 10 80, 30 70 C20 90, 40 100, 50 80 C60 100, 80 90, 70 70 C90 80, 100 60, 80 50 C100 40, 90 20, 70 30 C80 10, 60 0, 50 20 Z" />
        <circle cx="50" cy="50" r="14" fill="var(--bg-color)" />
    </svg>
    <div id="debug-msg">รอแป๊บนึงน้า กำลังจัดเตรียมหน้าร้าน...</div>
</div>

<div class="container">
    <header>
        <!-- ✨ ของตกแต่ง SVG -->
        <svg class="header-decor decor-1" width="30" height="30" viewBox="0 0 24 24" fill="var(--pink-accent)"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
        <svg class="header-decor decor-2" width="20" height="20" viewBox="0 0 24 24" fill="var(--purple-accent)"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
        
        <h1>เว็บไซต์สำหรับสมาชิกภายในคอร์สสอนทำเว็บสไตล์พิ้งจูเท่านั้น</h1>
        <p class="subtitle">PinkJu Style Premium Template</p>
    </header>

    <!-- User View -->
    <section id="view-user" class="view-section">
        <div id="controls-area" class="controls-area" style="display: none;">
            <div class="search-wrapper">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="ค้นหาชื่อเทมเพลต หรือ หมวดหมู่..." oninput="handleSearch(event)">
            </div>
            <div class="filter-scroll" id="filter-buttons"></div>
        </div>

        <div id="user-grid" class="grid"></div>
        <div class="footer">
            <a href="javascript:void(0)" onclick="switchSection('view-login')" class="admin-link">Administrator Login</a>
        </div>
    </section>

    <!-- Login View -->
    <section id="view-login" class="view-section">
        <div class="login-card">
            <h2 style="text-align:center; margin-bottom:20px; font-weight: 500;">Admin Login</h2>
            <div class="input-group"><label>Email Address</label><input type="email" id="login-email"></div>
            <div class="input-group"><label>Password</label><input type="password" id="login-pass"></div>
            <button type="button" class="btn btn-primary btn-full" onclick="processLogin()">เข้าสู่ระบบจัดการ</button>
            <div id="login-status" class="status-text"></div>
            <button type="button" class="btn btn-secondary btn-full" style="margin-top:10px;" onclick="switchSection('view-user')">กลับหน้าหลัก</button>
        </div>
    </section>

    <!-- Admin View -->
    <section id="view-admin" class="view-section">
        <div class="admin-nav">
            <h2>จัดการเทมเพลต</h2>
            <button type="button" class="btn-logout" onclick="processLogout()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                ออกจากระบบ
            </button>
        </div>
        <div id="admin-grid" class="grid"></div>
    </section>
</div>

<!-- Modal Form (Add/Edit) -->
<div id="modal-edit" class="modal">
    <div class="modal-content" style="border-color: var(--purple-accent);">
        <h3 id="modal-title" style="margin-bottom:20px; font-size:1.2rem;">จัดการข้อมูล</h3>
        
        <div class="input-group">
            <label>รูปภาพพรีวิว (สัดส่วน 1:1)</label>
            <input type="file" id="f-img" accept="image/*">
            <img id="p-img" style="width:100px; height:100px; object-fit:cover; border-radius:10px; margin-top:10px; display:none; border:1px solid var(--border-color);">
        </div>

        <div class="input-group">
            <label>หมวดหมู่สไตล์เทมเพลต</label>
            <select id="f-ep" class="custom-select">
                <option value="โทนพาสเทล">โทนพาสเทล</option>
                <option value="โทนดาร์ก">โทนดาร์ก</option>
                <option value="โทนสดใส">โทนสดใส</option>
                <option value="มินิมอล">มินิมอล</option>
                <option value="ทั่วไป">ทั่วไป</option>
            </select>
        </div>

        <div class="input-group"><label>ชื่อเทมเพลต</label><input type="text" id="f-title" placeholder="ตั้งชื่อรายการ"></div>
        
        <label class="checkbox-group">
            <input type="checkbox" id="f-logo">
            <span>เทมเพลตนี้มีโลโก้ประกอบ</span>
        </label>

        <div class="input-group"><label>ลิงก์ ดูตัวอย่างจริง</label><input type="url" id="f-preview" placeholder="https://..."></div>
        <div class="input-group"><label>ลิงก์ ใช้งาน (Google Docs)</label><input type="url" id="f-link" placeholder="https://..."></div>
        
        <input type="hidden" id="f-id">
        <input type="hidden" id="f-old-url">
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="button" class="btn btn-secondary btn-full" onclick="closeEditModal()">ยกเลิก</button>
            <button type="button" class="btn btn-primary btn-full" id="btn-save" onclick="processSave()">บันทึกข้อมูล</button>
        </div>
        <div id="modal-status" class="status-text"></div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="modal-delete" class="modal">
    <div class="modal-content delete-style">
        <div style="margin-bottom: 15px; color: var(--danger-color); display: flex; justify-content: center;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <h3 style="margin-bottom: 10px; font-size: 1.2rem;">ยืนยันการลบข้อมูล</h3>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 25px;">คุณแน่ใจหรือไม่ที่จะลบรายการนี้?<br>ข้อมูลที่ลบแล้วจะไม่สามารถกู้คืนได้</p>
        <div style="display:flex; gap:10px;">
            <button type="button" class="btn btn-secondary btn-full" onclick="closeDeleteModal()">ยกเลิก</button>
            <button type="button" class="btn btn-danger btn-full" onclick="confirmDelete()">ยืนยันการลบ</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: 'https://fwcwwmnrxecsxjgxephn.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3Y3d3bW5yeGVjc3hqZ3hlcGhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjg4NjMsImV4cCI6MjA5MDk0NDg2M30.aduDIUVyy92BC6uRFBaUaPH2N9tmQlweEk6zWb07GCY'
    };

    let supabase;
    let allTemplates = [];
    let currentCategory = 'All';
    let searchQuery = '';
    let itemToDeleteId = null;

    const timeout = setTimeout(() => {
        document.getElementById('debug-msg').innerHTML = 'การเชื่อมต่อล่าช้า กรุณารีเฟรชหน้าเว็บน้า';
    }, 8000);

    window.onload = async function() {
        try {
            if (typeof window.supabase === 'undefined') throw new Error("System SDK Error");
            supabase = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
            clearTimeout(timeout);
            
            const { data: { session } } = await supabase.auth.getSession();
            if (session) switchSection('view-admin');
            else switchSection('view-user');

            setupImagePreview();
            document.getElementById('loader').style.display = 'none';
        } catch (err) {
            document.getElementById('debug-msg').innerText = `Error: ${err.message}`;
        }
    };

    function switchSection(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'view-user') fetchUserView();
        if (id === 'view-admin') fetchAdminView();
    }

    /* ================= SYSTEM: USER ================= */
    async function fetchUserView() {
        const area = document.getElementById('user-grid');
        const controls = document.getElementById('controls-area');
        area.innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-size:0.9rem;">กำลังดึงข้อมูลสุดคิวท์...</p>';
        
        const { data, error } = await supabase.from('templates').select('*').order('created_at', { ascending: false });
        if (error) return area.innerHTML = `<p class="text-error">Error: ${error.message}</p>`;
        
        allTemplates = data || [];
        if (allTemplates.length === 0) {
            controls.style.display = 'none';
            area.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5; font-size:0.9rem;">ยังไม่มีรายการข้อมูลน้า</p>';
            return;
        }

        controls.style.display = 'block';
        buildCategoryFilters();
        renderFilteredTemplates();
    }

    function buildCategoryFilters() {
        const container = document.getElementById('filter-buttons');
        const categories = [...new Set(allTemplates.map(item => item.ep).filter(Boolean))];
        let html = `<button type="button" class="filter-btn active" onclick="setCategory('All', this)">ทั้งหมด</button>`;
        categories.forEach(cat => {
            html += `<button type="button" class="filter-btn" onclick="setCategory('${cat}', this)">${cat}</button>`;
        });
        container.innerHTML = html;
    }

    function setCategory(cat, btnElement) {
        currentCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        renderFilteredTemplates();
    }

    function handleSearch(event) {
        searchQuery = event.target.value.toLowerCase();
        renderFilteredTemplates();
    }

    function isNewTemplate(dateString) {
        if (!dateString) return false;
        const uploadDate = new Date(dateString);
        const today = new Date();
        const diffTime = Math.abs(today - uploadDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        return diffDays <= 7; // ภายใน 7 วันถือว่า New
    }

    function renderFilteredTemplates() {
        const area = document.getElementById('user-grid');
        let filtered = allTemplates;

        if (currentCategory !== 'All') filtered = filtered.filter(item => item.ep === currentCategory);
        if (searchQuery) {
            filtered = filtered.filter(item => 
                (item.title && item.title.toLowerCase().includes(searchQuery)) || 
                (item.ep && item.ep.toLowerCase().includes(searchQuery))
            );
        }

        if (filtered.length === 0) {
            area.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5; font-size:0.9rem;">ไม่พบผลลัพธ์ที่ค้นหา</p>';
            return;
        }

        area.innerHTML = filtered.map(item => {
            const isNew = isNewTemplate(item.created_at);
            // ✨ ป้าย NEW มุมขวาบน (ปรับให้โดดเด่นและพุ่งออกมานิดนึง)
            const newBadge = isNew ? `<div class="badge-new"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg> NEW</div>` : '';
            
            // 🏷️ ป้าย Tag รายละเอียด (ย้ายมาไว้ใต้รูป)
            const epTag = `<span class="tag tag-ep"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg> ${item.ep || 'ทั่วไป'}</span>`;
            const logoTag = item.has_logo ? `<span class="tag tag-logo"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> มีโลโก้</span>` : '';

            const previewBtn = item.preview_link ? `<a href="${item.preview_link}" target="_blank" class="btn btn-secondary">ตัวอย่าง</a>` : '';
            const docsBtn = item.link ? `<a href="${item.link}" target="_blank" class="btn btn-primary">ใช้งาน</a>` : '';

            return `
            <div class="card">
                ${newBadge}
                <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x400/1e293b/fff?text=No+Image'">
                
                <div class="detail-tags">
                    ${epTag}
                    ${logoTag}
                </div>

                <h4 class="card-title">${item.title || 'ไม่ได้ระบุชื่อ'}</h4>
                <div class="btn-row">
                    ${previewBtn}
                    ${docsBtn}
                </div>
            </div>
            `;
        }).join('');
    }

    /* ================= SYSTEM: ADMIN ================= */
    async function processLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const status = document.getElementById('login-status');
        if (!email || !pass) { status.innerText = 'กรุณาระบุข้อมูลให้ครบ'; return; }
        
        status.style.color = 'var(--blue-accent)';
        status.innerText = 'กำลังเข้าสู่ระบบ...';
        const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
        
        if (error) { status.style.color = '#f87171'; status.innerText = error.message; }
        else switchSection('view-admin');
    }

    async function processLogout() { await supabase.auth.signOut(); switchSection('view-user'); }

    async function fetchAdminView() {
        const grid = document.getElementById('admin-grid');
        grid.innerHTML = '<p style="grid-column: 1/-1;">Loading...</p>';
        const { data, error } = await supabase.from('templates').select('*').order('created_at', { ascending: false });
        if (error) return;

        grid.innerHTML = `
            <div class="card add-card" onclick="openEditModal()">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <p style="margin-top:10px; font-size:0.85rem;">เพิ่มรายการ</p>
            </div>
        `;

        data.forEach(item => {
            const isNew = isNewTemplate(item.created_at);
            const newBadge = isNew ? `<div class="badge-new" style="padding: 2px 8px; font-size: 0.6rem; top: -6px; right: -6px;">NEW</div>` : '';
            
            const epTag = `<span class="tag tag-ep">${item.ep || 'ทั่วไป'}</span>`;
            const logoTag = item.has_logo ? `<span class="tag tag-logo">มีโลโก้</span>` : '';

            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                ${newBadge}
                <div class="action-layer">
                    <button type="button" class="btn-icon" onclick='openEditModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button type="button" class="btn-icon" onclick="openDeleteModal('${item.id}')" style="background:#7f1d1d; border-color:#ef4444;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
                <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/300x300'">
                <div class="detail-tags" style="margin-bottom: 8px;">
                    ${epTag}
                    ${logoTag}
                </div>
                <p class="card-title" style="margin-bottom:0;">${item.title}</p>
            `;
            grid.appendChild(div);
        });
    }

    function setupImagePreview() {
        document.getElementById('f-img').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ex => { const p = document.getElementById('p-img'); p.src = ex.target.result; p.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };
    }

    /* --- Edit Modal Logic --- */
    function openEditModal(item = null) {
        document.getElementById('f-id').value = item ? item.id : '';
        document.getElementById('f-title').value = item ? item.title : '';
        
        const epSelect = document.getElementById('f-ep');
        if (item && item.ep) {
            const options = Array.from(epSelect.options).map(opt => opt.value);
            epSelect.value = options.includes(item.ep) ? item.ep : 'ทั่วไป';
        } else {
            epSelect.value = 'โทนพาสเทล';
        }

        document.getElementById('f-link').value = item ? item.link : '';
        document.getElementById('f-preview').value = item ? (item.preview_link || '') : '';
        document.getElementById('f-old-url').value = item ? item.image : '';
        document.getElementById('f-logo').checked = item ? (item.has_logo === true) : false;
        
        const preview = document.getElementById('p-img');
        if (item && item.image) { preview.src = item.image; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
        
        document.getElementById('modal-title').innerText = item ? 'แก้ไขข้อมูล' : 'เพิ่มข้อมูลใหม่';
        document.getElementById('modal-edit').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('modal-edit').classList.remove('active');
        document.getElementById('modal-status').innerText = '';
        document.getElementById('f-img').value = '';
    }

    async function processSave() {
        const id = document.getElementById('f-id').value;
        const file = document.getElementById('f-img').files[0];
        const status = document.getElementById('modal-status');
        const btn = document.getElementById('btn-save');

        if (!id && !file) return status.innerText = 'กรุณาเลือกไฟล์ภาพน้า';
        
        status.style.color = 'var(--blue-accent)';
        status.innerText = 'กำลังอัปโหลดข้อมูล...';
        btn.disabled = true;

        try {
            let imageUrl = document.getElementById('f-old-url').value;
            if (file) {
                // แก้ชื่อไฟล์ภาษาไทยไม่ให้อัปโหลดพัง (Invalid Key fix)
                const ext = file.name.split('.').pop();
                const safeName = Date.now() + "_" + Math.random().toString(36).substring(2, 9) + "." + ext;
                const { error: upErr } = await supabase.storage.from('images').upload(safeName, file);
                if (upErr) throw upErr;
                imageUrl = supabase.storage.from('images').getPublicUrl(safeName).data.publicUrl;
            }

            const payload = { 
                title: document.getElementById('f-title').value, 
                ep: document.getElementById('f-ep').value, 
                link: document.getElementById('f-link').value, 
                preview_link: document.getElementById('f-preview').value,
                has_logo: document.getElementById('f-logo').checked,
                image: imageUrl 
            };

            const { error } = id ? await supabase.from('templates').update(payload).eq('id', id) : await supabase.from('templates').insert([payload]);
            if (error) throw error;
            
            closeEditModal();
            fetchAdminView();
        } catch (e) {
            status.style.color = '#f87171';
            status.innerText = `Error: ${e.message}`;
        } finally { btn.disabled = false; }
    }

    /* --- Custom Delete Modal Logic --- */
    function openDeleteModal(id) {
        itemToDeleteId = id;
        document.getElementById('modal-delete').classList.add('active');
    }

    function closeDeleteModal() {
        itemToDeleteId = null;
        document.getElementById('modal-delete').classList.remove('active');
    }

    async function confirmDelete() {
        if (!itemToDeleteId) return;
        closeDeleteModal();
        
        const grid = document.getElementById('admin-grid');
        grid.innerHTML = '<p style="grid-column: 1/-1;">กำลังลบข้อมูล...</p>';

        const { error } = await supabase.from('templates').delete().eq('id', itemToDeleteId);
        if (error) alert("Error deleting: " + error.message);
        
        itemToDeleteId = null;
        fetchAdminView();
    }
</script>
