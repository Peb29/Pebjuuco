<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PinkJu Style System</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: rgba(255, 255, 255, 0.1);
            --pink: #f472b6; --blue: #38bdf8; --purple: #c084fc; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { text-align: center; padding: 40px 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 25px; margin-bottom: 30px; }
        h1 { font-size: 1.6rem; background: linear-gradient(90deg, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.5; font-weight: 600; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; position: relative; }
        .card-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; background: #000; margin-bottom: 15px; }
        
        .btn { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
            background: linear-gradient(45deg, var(--pink), var(--purple)); color: #fff;
            font-weight: 600; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .add-card { border: 2px dashed var(--pink); background: transparent; height: 280px; justify-content: center; color: var(--pink); cursor: pointer; }
        .action-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
        .icon-btn { width: 35px; height: 35px; border-radius: 50%; background: #000; color: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; position: relative; }

        .status-msg { margin-top: 15px; font-size: 0.8rem; text-align: center; color: var(--blue); min-height: 1.2rem; }
        .footer { text-align: center; margin-top: 50px; padding: 20px; opacity: 0.2; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-size:0.8rem; color:var(--blue);">Loading System...</p>
</div>

<div class="container">
    <header>
        <h1>เว็บไซต์สำหรับสมาชิกภายในคอร์สสอนทำเว็บสไตล์พิ้งจูเท่านั้น</h1>
        <p style="color: #94a3b8; font-size: 0.8rem; margin-top: 10px;">Membership Portal System</p>
    </header>

    <section id="view-user" class="view-section">
        <div id="user-content" class="grid"></div>
        <div class="footer"><a href="javascript:void(0)" onclick="switchView('view-login')" style="color:#94a3b8; font-size:0.7rem; text-decoration:none;">Admin Login</a></div>
    </section>

    <section id="view-login" class="view-section">
        <div style="max-width:400px; margin:0 auto; background:var(--card); padding:30px; border-radius:25px;">
            <h2 style="text-align:center; margin-bottom:25px;">Admin Login</h2>
            <div class="input-group"><label>Email</label><input type="email" id="login-email"></div>
            <div class="input-group"><label>Password</label><input type="password" id="login-password"></div>
            <button class="btn" onclick="handleLogin()">เข้าสู่ระบบจัดการ</button>
            <div id="login-status" class="status-msg"></div>
            <button class="btn btn-secondary" style="margin-top:10px;" onclick="switchView('view-user')">กลับหน้าหลัก</button>
        </div>
    </section>

    <section id="view-admin" class="view-section">
        <div class="admin-header">
            <h3>จัดการเทมเพลต</h3>
            <button class="btn btn-secondary" style="width:auto; padding:8px 20px;" onclick="handleLogout()">Logout</button>
        </div>
        <div id="admin-grid" class="grid"></div>
    </section>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-bottom:20px;">เพิ่มข้อมูล</h3>
        <div class="input-group">
            <label>รูปภาพพรีวิว</label>
            <input type="file" id="f-img" accept="image/*">
            <img id="p-img" style="width:100%; height:120px; object-fit:cover; border-radius:10px; margin-top:10px; display:none;">
        </div>
        <div class="input-group"><label>EP (หมวดหมู่)</label><input type="text" id="f-ep"></div>
        <div class="input-group"><label>ชื่อเทมเพลต</label><input type="text" id="f-title"></div>
        <div class="input-group"><label>ลิงก์ Google Drive</label><input type="url" id="f-link"></div>
        
        <input type="hidden" id="f-id"><input type="hidden" id="f-old">
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
            <button class="btn" id="btn-save" onclick="handleSave()">บันทึกข้อมูล</button>
        </div>
        <div id="modal-status" class="status-msg"></div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: 'https://fwcwwmnrxecsxjgxephn.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3Y3d3bW5yeGVjc3hqZ3hlcGhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjg4NjMsImV4cCI6MjA5MDk0NDg2M30.aduDIUVyy92BC6uRFBaUaPH2N9tmQlweEk6zWb07GCY'
    };

    let supabase;

    window.onload = async function() {
        try {
            supabase = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
            const { data: { session } } = await supabase.auth.getSession();
            if (session) switchView('view-admin'); else switchView('view-user');
            
            document.getElementById('f-img').onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = ex => { const p = document.getElementById('p-img'); p.src = ex.target.result; p.style.display = 'block'; };
                    reader.readAsDataURL(file);
                }
            };
            document.getElementById('loader').style.display = 'none';
        } catch (e) { alert("Error: " + e.message); }
    };

    function switchView(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'view-user') loadUser(); if (id === 'view-admin') loadAdmin();
    }

    async function handleLogin() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const s = document.getElementById('login-status');
        if(!e || !p) return s.innerText = "กรุณากรอกข้อมูลให้ครบ";
        s.innerText = "กำลังตรวจสอบ...";
        const { error } = await supabase.auth.signInWithPassword({ email: e, password: p });
        if (error) s.innerText = "ผิดพลาด: " + error.message; else switchView('view-admin');
    }

    async function handleLogout() { await supabase.auth.signOut(); switchView('view-user'); }

    async function loadUser() {
        const { data, error } = await supabase.from('templates').select('*').order('ep', { ascending: true });
        if (error) return;
        document.getElementById('user-content').innerHTML = data.map(i => `
            <div class="card">
                <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/300x200'">
                <p style="font-size:0.9rem; margin-bottom:15px; color:#f1f5f9;">${i.title}</p>
                <a href="${i.link}" target="_blank" class="btn">เข้าใช้งานเทมเพลต</a>
            </div>
        `).join('') || '<p style="text-align:center;width:100%;opacity:0.5">ไม่มีข้อมูล</p>';
    }

    async function loadAdmin() {
        const { data, error } = await supabase.from('templates').select('*').order('created_at', { ascending: false });
        if (error) return;
        const grid = document.getElementById('admin-grid');
        grid.innerHTML = '<div class="card add-card" onclick="openModal()">+ เพิ่มรายการ</div>';
        data.forEach(i => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div class="action-btns">
                    <button class="icon-btn" onclick='openModal(${JSON.stringify(i)})'>Edit</button>
                    <button class="icon-btn" onclick="handleDelete('${i.id}')" style="color:#f87171">Del</button>
                </div>
                <img src="${i.image}" class="card-img">
                <p style="font-size:0.75rem; color:var(--blue); font-weight:600;">${i.ep}</p>
                <p style="font-size:0.85rem;">${i.title}</p>
            `;
            grid.appendChild(d);
        });
    }

    window.openModal = function(i = null) {
        document.getElementById('f-id').value = i ? i.id : '';
        document.getElementById('f-title').value = i ? i.title : '';
        document.getElementById('f-ep').value = i ? i.ep : '';
        document.getElementById('f-link').value = i ? i.link : '';
        document.getElementById('f-old').value = i ? i.image : '';
        const p = document.getElementById('p-img');
        if (i) { p.src = i.image; p.style.display = 'block'; } else { p.style.display = 'none'; }
        document.getElementById('modal-status').innerText = '';
        document.getElementById('modal').classList.add('active');
    };

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function handleSave() {
        const id = document.getElementById('f-id').value;
        const file = document.getElementById('f-img').files[0];
        const status = document.getElementById('modal-status');
        const btn = document.getElementById('btn-save');

        if(!id && !file) return status.innerText = "กรุณาเลือกรูปภาพ";
        
        btn.disabled = true;
        status.innerText = "กำลังประมวลผล...";

        try {
            let imgUrl = document.getElementById('f-old').value;
            if (file) {
                const name = Date.now() + "_" + file.name.replace(/\s/g, '');
                const { error: upErr } = await supabase.storage.from('images').upload(name, file);
                if (upErr) throw new Error("อัปโหลดรูปไม่สำเร็จ: " + upErr.message);
                imgUrl = supabase.storage.from('images').getPublicUrl(name).data.publicUrl;
            }

            const payload = { 
                title: document.getElementById('f-title').value, 
                ep: document.getElementById('f-ep').value, 
                link: document.getElementById('f-link').value, 
                image: imgUrl 
            };

            const { error: dbErr } = id ? 
                await supabase.from('templates').update(payload).eq('id', id) : 
                await supabase.from('templates').insert([payload]);

            if (dbErr) throw new Error("บันทึกข้อมูลไม่สำเร็จ: " + dbErr.message);
            
            closeModal(); loadAdmin();
        } catch (err) {
            status.innerText = "Error: " + err.message;
            alert(err.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function handleDelete(id) {
        if (!confirm("ลบรายการนี้ใช่ไหม?")) return;
        await supabase.from('templates').delete().eq('id', id);
        loadAdmin();
    }
</script>
</body>
</html>
